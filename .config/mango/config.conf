# Environment variables
env=QT_QPA_PLATFORM,wayland
env=ELECTRON_OZONE_PLATFORM_HINT,auto
env=QT_QPA_PLATFORMTHEME,gtk3

# Window effect
blur=1
blur_layer=0
blur_optimized=1
blur_params_num_passes = 2
blur_params_radius = 5
blur_params_noise = 0.02
blur_params_brightness = 0.9
blur_params_contrast = 0.9
blur_params_saturation = 1.2

shadows = 1
layer_shadows = 1
shadow_only_floating = 1
shadows_size = 10
shadows_blur = 15
shadows_position_x = 0
shadows_position_y = 0

border_radius=0
no_radius_when_single=1
focused_opacity=1.0
unfocused_opacity=0.95

# Define layouts
circle_layout=tile,scroller,deck,grid,monocle

# Animation Configuration(support type:zoom,slide)
# tag_animation_direction: 1-horizontal,0-vertical
animations=1
layer_animations=1
animation_type_open=fade
animation_type_close=fade
animation_fade_in=1
animation_fade_out=1
tag_animation_direction=0
zoom_initial_ratio=0.3
zoom_end_ratio=0.8
fadein_begin_opacity=0.5
fadeout_begin_opacity=0.8
animation_duration_move=300
animation_duration_open=250
animation_duration_tag=200
animation_duration_close=250
animation_duration_focus=0
animation_curve_open=0.46,1.0,0.29,1
animation_curve_move=0.46,1.0,0.29,1
animation_curve_tag=0.46,1.0,0.29,1
animation_curve_close=0.08,0.92,0,1
animation_curve_focus=0.46,1.0,0.29,1
animation_curve_opafadein=0.46,1.0,0.29,1
animation_curve_opafadeout=0.5,0.5,0.5,0.5

# Scroller Layout Setting
scroller_structs=5
scroller_default_proportion=0.5
scroller_focus_center=0
scroller_prefer_center=0
edge_scroller_pointer_focus=1
scroller_proportion_preset=0.25,0.5,1.0
scroller_ignore_proportion_single=0
scroller_default_proportion_single=1.0

# Master-Stack Layout Setting
new_is_master=0
default_mfact=0.5
default_nmaster=1
smartgaps=0

# Overview Setting
hotarea_size=10
hotarea_corner=0
enable_hotarea=1
ov_tab_mode=1
overviewgappi=5
overviewgappo=30

# Misc
no_border_when_single=0
axis_bind_apply_timeout=100
focus_on_activate=1
idleinhibit_ignore_visible=0
sloppyfocus=1
warpcursor=1
focus_cross_monitor=0
focus_cross_tag=0
enable_floating_snap=0
snap_distance=30
cursor_size=24
drag_tile_to_tile=1

# keyboard
repeat_rate=100
repeat_delay=250
numlockon=1
xkb_rules_layout=us(altgr-intl)

# Trackpad
# need relogin to make it apply
disable_trackpad=0
tap_to_click=1
tap_and_drag=1
drag_lock=1
trackpad_natural_scrolling=1
disable_while_typing=1
left_handed=0
middle_button_emulation=0
swipe_min_threshold=1

# mouse
# need relogin to make it apply
mouse_natural_scrolling=0

# Appearance
gappih=5
gappiv=5
gappoh=5
gappov=5
scratchpad_width_ratio=0.8
scratchpad_height_ratio=0.9
borderpx=2

# layer rule
# layerrule=animation_type_open:zoom,layer_name:rofi
# layerrule=animation_type_close:zoom,layer_name:rofi
layerrule=noanim:1,layer_name:^dms

# Source sub-configs
source=./bind.conf
source=./env.conf
source=./rule.conf
source=./tag.conf
source=./noctalia.conf

# More option see https://github.com/DreamMaoMao/mango/wiki/
exec-once=dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
# exec-once=systemctl --user start mango-session.target
exec-once=qs -c noctalia-shell --no-duplicate
exec-once=jamesdsp -t
exec-once=ffplay -v 0 -nodisp -autoexit $XDG_CONFIG_HOME/startup.ogg

# This sources the noctalia theme

source = /home/gatonegro/.config/mango/noctalia.conf

