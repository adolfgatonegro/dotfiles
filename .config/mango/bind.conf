# Reload config
bind=Super+Ctrl,R,reload_config
bind=Ctrl+Alt,F10,reload_config

# menu and terminal
bind=Super,Space,spawn,rofi -show drun
bind=Super,R,spawn,rofi -show drun
bind=Super,Return,spawn,foot
bind=Super,t,spawn,foot

# applications
bind=Super,b,spawn,firefox
bind=Super,d,spawn,vesktop
bind=Super,f,spawn,foot -e yazi
bind=Super,e,spawn,foot -e nvim

# exit
# bind=Super,m,quit
bind=Super,q,killclient,

# switch window focus
# bind=Super,k,focusstack,prev
# bind=Super,j,focusstack,next
bind=Super,h,focusdir,left
bind=Super,l,focusdir,right
bind=Super,k,focusdir,up
bind=Super,j,focusdir,down
# bind=Super,k,spawn_shell,LAYOUT="$(mmsg -gl)"; case "${LAYOUT##* }" in "K") mmsg -d focusstack,prev ;; "S") mmsg -d scroller_stack,left ;; *) mmsg -d focusdir,up ;; esac
# bind=Super,j,spawn_shell,LAYOUT="$(mmsg -gl)"; case "${LAYOUT##* }" in "K") mmsg -d focusstack,next ;; "S") mmsg -d scroller_stack,right ;; *) mmsg -d focusdir,down ;; esac

# swap window
bind=Super+Shift,k,exchange_client,up
bind=Super+Shift,j,exchange_client,down
# bind=Super+Shift,k,exchange_stack_client,prev
# bind=Super+Shift,j,exchange_stack_client,next
bind=Super+Shift,h,exchange_client,left
bind=Super+Shift,l,exchange_client,right

# switch window status
bind=Super,grave,spawn,rofi -show window
bind=Super,g,toggleglobal,
bind=Super,Tab,toggleoverview,
bind=Super,v,togglefloating,
bind=Super,y,togglemaximizescreen,
bind=Super+Shift,y,togglefullscreen,
bind=Super+Ctrl+Shift,y,togglefakefullscreen,
bind=Super,i,minimized,
bind=Super,o,toggleoverlay,
bind=Super+Shift,I,restore_minimized
bind=Alt,z,toggle_scratchpad

# scroller layout
bind=Super,bracketleft,scroller_stack,left
bind=Super,bracketright,scroller_stack,right
bind=Alt,e,set_proportion,1.0
bind=Alt,x,switch_proportion_preset,

# switch layout
bind=Super,n,switch_layout

# tag switch
bind=Super+Ctrl,J,viewtoright_have_client,0
bind=Super+Ctrl,K,viewtoleft_have_client,0
# bind=Super,Left,viewtoleft,0
# bind=Super,Right,viewtoright,0
# bind=Ctrl,Right,viewtoright_have_client,0
# bind=Ctrl+Super,Left,tagtoleft,0
# bind=Ctrl+Super,Right,tagtoright,0

bind=Super,1,view,1,0
bind=Super,2,view,2,0
bind=Super,3,view,3,0
bind=Super,4,view,4,0
bind=Super,5,view,5,0
bind=Super,6,view,6,0
bind=Super,7,view,7,0
bind=Super,8,view,8,0
bind=Super,9,view,9,0

# tag: move client to the tag and focus it
# tagsilent: move client to the tag and not focus it
# bind=Alt,1,tagsilent,1
bind=Super+Shift,1,tag,1,0
bind=Super+Shift,2,tag,2,0
bind=Super+Shift,3,tag,3,0
bind=Super+Shift,4,tag,4,0
bind=Super+Shift,5,tag,5,0
bind=Super+Shift,6,tag,6,0
bind=Super+Shift,7,tag,7,0
bind=Super+Shift,8,tag,8,0
bind=Super+Shift,9,tag,9,0

# monitor switch
bind=Super,comma,focusmon,left
bind=Super,period,focusmon,right
bind=Super+Shift,comma,tagmon,left
bind=Super+Shift,period,tagmon,right

# gaps
# bind=Alt+Shift,X,incgaps,1
# bind=Alt+Shift,Z,incgaps,-1
# bind=Alt+Shift,R,togglegaps

# Layout
bind=Super+Ctrl,H,setmfact,-0.05
bind=Super+Ctrl,L,setmfact,+0.05
bind=Super+Ctrl,S,setlayout,scroller
bind=Super+Ctrl,T,setlayout,tile
bind=Super+Ctrl,M,setlayout,monocle

# movewin
bind=Ctrl+Shift,Up,movewin,+0,-50
bind=Ctrl+Shift,Down,movewin,+0,+50
bind=Ctrl+Shift,Left,movewin,-50,+0
bind=Ctrl+Shift,Right,movewin,+50,+0

# resizewin
bind=Ctrl+Alt,Up,resizewin,+0,-50
bind=Ctrl+Alt,Down,resizewin,+0,+50
bind=Ctrl+Alt,Left,resizewin,-50,+0
bind=Ctrl+Alt,Right,resizewin,+50,+0

# Mouse Button Bindings
# btn_left and btn_right can't bind none mod key
mousebind=Super,btn_left,moveresize,curmove
mousebind=Super,btn_middle,togglemaximizescreen,0
mousebind=Super,btn_right,moveresize,curresize

# Axis Bindings
axisbind=Super,UP,viewtoleft_have_client
axisbind=Super,DOWN,viewtoright_have_client

# Lock screen
bind=Super+Alt,l,spawn,shellctl lock-screen

# bind=Super,Tab,viewtoright_have_client,0

# Session menu
bind=Super+Shift,x,spawn,shellctl session-menu

# Shell
bind=Alt+Shift,T,spawn,shellctl control-centre
bind=Alt+Shift,N,spawn,shellctl notifications
bind=Alt+Shift,I,spawn,shellctl clipboard
bind=Alt+Shift,E,spawn,shellctl emoji
bind=Alt+Shift,P,spawn,rofi-displays

# Scratchpads
bind=Super,F10,toggle_named_scratchpad,sp-btop,none,foot -a sp-btop -e btop
bind=Super,m,toggle_named_scratchpad,sp-cmus,none,foot -a sp-cmus-e cmus

# Screenshot
bind=none,Print,spawn,flameshot gui
bind=Super+Shift,P,spawn,flameshot gui

# Media keys
bindl=none,XF86AudioRaiseVolume,spawn,shellctl volume-up
bindl=none,XF86AudioLowerVolume,spawn,shellctl volume-down
bindl=none,XF86AudioMute,spawn,shellctl volume-mute-output
bindl=none,XF86AudioMicMute,spawn,shellctl volume-mute-input
bindl=none,XF86MonBrightnessUp,spawn,shellctl brightness-up
bindl=none,XF86MonBrightnessDown,spawn,shellctl brightness-down
bindl=none,XF86AudioPlay,spawn,shellctl mpris-play-pause
bindl=none,XF86AudioStop,spawn,shellctl mpris-stop
bindl=none,XF86AudioPrev,spawn,shellctl mpris-previous
bindl=none,XF86AudioNext,spawn,shellctl mpris-next

# Keymode - Layout switcher
bind=Alt,l,setkeymode,layout
keymode=layout
bind=NONE,d,setlayout,deck
bind=NONE,g,setlayout,grid
bind=NONE,m,setlayout,monocle
bind=NONE,s,setlayout,scroller
bind=NONE,t,setlayout,tile
bind=NONE,Escape,setkeymode,default
